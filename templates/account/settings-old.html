<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
                <div class="position-sticky pt-3">
                    <!-- Sidebar Menu from Dashboard Example -->
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="/">
                                Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                Settings
                            </a>
                        </li>
                        <!-- Add more menu items as needed -->
                    </ul>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <h2 class="mt-4">Settings</h2>

                <!-- Chart Settings -->
                <div class="row mb-4">
                    <div class="col-12">
                        <h5>Top Chart Settings</h5>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="chartOptions" id="chart1" value="chart1">
                            <label class="form-check-label" for="chart1">Chart 1</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="chartOptions" id="chart2" value="chart2">
                            <label class="form-check-label" for="chart2">Chart 2</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="chartOptions" id="chart3" value="chart3">
                            <label class="form-check-label" for="chart3">Chart 3</label>
                        </div>
                    </div>
                </div>
                <!-- Chart Settings -->
                <div class="row mb-4">
                    <div class="col-12">
                        <h5>Reg Sho Chart Settings</h5>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="chartOptions" id="chart1" value="chart1">
                            <label class="form-check-label" for="chart1">Chart 1</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="chartOptions" id="chart2" value="chart2">
                            <label class="form-check-label" for="chart2">Chart 2</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="chartOptions" id="chart3" value="chart3">
                            <label class="form-check-label" for="chart3">Chart 3</label>
                        </div>
                    </div>
                </div>

                <!-- Display Options -->
                <div class="row mb-4">
                    <div class="col-12">
                        <h5>Display Options</h5>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="showSec" value="showSec">
                            <label class="form-check-label" for="showSec">Show SEC</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="showNews" value="showNews">
                            <label class="form-check-label" for="showNews">Show News</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="showInfo" value="showInfo">
                            <label class="form-check-label" for="showInfo">Show Info</label>
                        </div>
                    </div>
                </div>

                <!-- Number Input Settings -->
                <div class="row mb-4">
                    <div class="col-12">
                        <h5>Ticker Number Settings</h5>
                        <div class="mb-3">
                            <label for="shortVolume" class="form-label">Number of Tickers for Short Volume</label>
                            <input type="number" class="form-control" id="shortVolume" placeholder="Enter a number">
                        </div>
                        <div class="mb-3">
                            <label for="mostActive" class="form-label">Number of Tickers for Most Active</label>
                            <input type="number" class="form-control" id="mostActive" placeholder="Enter a number">
                        </div>
                        <div class="mb-3">
                            <label for="topGainers" class="form-label">Number of Tickers for Top Gainers</label>
                            <input type="number" class="form-control" id="topGainers" placeholder="Enter a number">
                        </div>
                        <div class="mb-3">
                            <label for="topLosers" class="form-label">Number of Tickers for Top Losers</label>
                            <input type="number" class="form-control" id="topLosers" placeholder="Enter a number">
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
